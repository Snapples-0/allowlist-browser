name: Build IPA (unsigned)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      - name: Generate iOS project structure
        run: |
          if [ ! -f ios/Podfile ]; then
            echo "ios/Podfile not found – regenerating Flutter project platform files..."
            flutter --version
            # Remove any accidental root-level iOS host artifacts from prior incorrect generation
            rm -rf Runner Runner.xcodeproj Runner.xcworkspace RunnerTests
            flutter create .
            echo "Flutter platform files regenerated."
          else
            echo "ios/Podfile already exists – skipping flutter create."
          fi

          if [ ! -f ios/Podfile ]; then
            echo "ERROR: ios/Podfile still not found after flutter create."
            echo "Root directory contents:"
            ls -la
            echo "ios/ directory contents:"
            ls -la ios || true
            exit 1
          fi

      - name: Patch iOS Podfile
        run: |
          python3 - <<'PYEOF'
          import re, sys

          with open('ios/Podfile', 'r') as f:
              content = f.read()

          # Uncomment/set platform to 12.0, anchored to start of line
          content = re.sub(r'^#?\s*platform :ios,\s*\'[^\']*\'', "platform :ios, '12.0'", content, flags=re.MULTILINE)

          # Inject deployment-target enforcement and -G flag stripping into post_install
          old_snippet = "    flutter_additional_ios_build_settings(target)"
          new_snippet = """\
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '12.0'
                %w[OTHER_CFLAGS OTHER_CPLUSPLUSFLAGS].each do |key|
                  flags = config.build_settings[key]
                  next unless flags
                  flags = flags.split(' ') if flags.is_a?(String)
                  config.build_settings[key] = flags.reject { |f| f == '-G' }
                end
              end"""

          if old_snippet not in content:
              print("WARNING: expected snippet not found in Podfile; -G stripping may not apply", file=sys.stderr)
          else:
              content = content.replace(old_snippet, new_snippet, 1)
              print("Podfile patched: deployment target set to 12.0 and -G flag stripping added.")

          with open('ios/Podfile', 'w') as f:
              f.write(content)
          PYEOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no code signing)
        run: flutter build ios --release --no-codesign

      - name: Package .app into unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r app-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: app-unsigned.ipa
          retention-days: 30
