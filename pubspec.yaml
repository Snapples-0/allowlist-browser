name: allowlist_browser
description: A kids-safe web browser with a server-side allowlist managed by parents via Firebase.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.7.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  shared_preferences: ^2.3.2

flutter:
  uses-material-design: true
